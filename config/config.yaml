log:
  level: info
  format: text
  addSource: false

postgrest:
  url: "http://rest:3000"
  anonKey: ""
  serviceKey: ""

# Cluster PocketBase superuser credentials (gateway admin API client).
pocketbase:
  url: ""
  username: ""
  password: ""

supabase:
  anonKey: ""
  publishableKey: ""
  serviceKey: ""
  secretKey: ""
  dashboardUser: ""
  dashboardPassword: ""

upstreams:
  meta: "http://meta:8080"
  studio: "http://studio:3000"
  storage: "http://storage:5000"
  # Next.js PWA (D17): internal only; gateway reverse-proxies non-API paths.
  website: "http://website:3000"

waf:
  coraza:
    enabled: true
    owaspCRS: true
    requestBodyLimit: 10485760
    skipPaths:
      - /storage/v1/
  allowedIPs: []
  publicReadPaths: []

nats:
  url: "nats://nats:4222"
  optional: false

clickhouse:
  addr: "platform-clickhouse:9000"
  database: "platform"
  username: "default"
  password: ""

rpc:
  password1: "thinkmay protect your data"

relay:
  pollIntervalMs: 500
  batchSize: 50

# Global pg_cron replacement (D15/P14). Disabled by default; the scheduler
# binary (CMD=scheduler) sets APP_SCHEDULER_ENABLED=1. Each job ticks on `every`
# and calls a PostgREST RPC — billing math stays in Postgres (P5).
# Legacy pg_cron parity: jobs 7,20,42,74 from job_rows.sql export.
scheduler:
  enabled: false
  jobs:
    - name: verify_all_deposits
      every: 10s
      rpc: verify_all_deposits
      timeoutMs: 5000
    - name: verify_all_payment
      every: 10s
      rpc: verify_all_payment_v2
      timeoutMs: 5000
    - name: clean_expired_subscription
      every: 24h
      rpc: clean_expired_subscription
      timeoutMs: 5000
    - name: validate_subscription_usage
      every: 1h
      rpc: validate_subscription_usage_v1
      timeoutMs: 5000

# Provider checkout + status poll in worker (replaces Postgres vendor HTTP + verify_all_transactions_v2).
payment:
  enabled: false
  checkoutEnabled: true
  pollerEnabled: true
  pollEvery: 10s
  rsaSignerURL: "http://rsa:8080"

# Usage collector (F06 / P1-B): runs inside worker when enabled.
# Replaces snapshoot_v6 (5m), snapshoot_volume_v1 (hourly), and addon snapshoot_* (hourly).
usageCollector:
  enabled: false
  every: 5m
  addonEvery: 1h
  shadowMode: false
  sessionMinutes: 5

# Persona refresh worker (P1-C): replaces node PocketBase persona cron.
persona:
  enabled: false
  every: 1m
  maxBatch: 20
  concurrent: 10
  rybbitMinSpacing: 250ms
  rybbitURL: ""
  rybbitAPIKey: ""
  rybbitSiteDomain: ""

gateway:
  publicURL: "https://thinkmay.net"

storj:
  accessGrant: ""

# OpenAI-compatible LLM for PWA game search (/api/pwa/search).
llm:
  baseURL: ""
  apiKey: ""
  model: "gpt-4o"

admin:
  enabled: false
  allowedIPs: []
  allowedEmails: []
  cookieDomain: ".thinkmay.net"
  sessionTTLHours: 8
  otpTTLMinutes: 10
  signingSecret: ""
  basicAuthUser: ""
  basicAuthPassword: ""
  redis:
    url: "redis://redis:6379/0"
  resend:
    apiKey: ""
    from: "Thinkmay Ops <ops@thinkmay.net>"
  hosts:
    public: thinkmay.net
    studio: studio.thinkmay.net
    analytics: analytics.thinkmay.net
    grafana: grafana.thinkmay.net
  ingest:
    analyticsPrefix: /api/
  upstreams:
    studio: "http://studio:3000"
    rybbitClient: "http://rybbit-client:3000"
    rybbitBackend: "http://rybbit-backend:3001"
    grafana: "http://grafana:3000"

# Infra metrics push cache (D16). Runs inside the gateway on metrics.listenAddr.
metrics:
  redisUrl: "redis://redis:6379/1"
  cacheTTLSeconds: 90
  scrapeCacheSeconds: 10
  ingestSecret: ""
  listenAddr: ":9090"

# Public edge (TDD D14): sole host-published ports :80 / :443.
tls:
  enabled: true
  httpPort: "80"
  httpsPort: "443"
  autocertCache: "/.autocert_cache"
  hosts:
    - thinkmay.net

# Dev-only plain HTTP when APP_TLS_ENABLED=0 (not used in compose).
port: "4000"
