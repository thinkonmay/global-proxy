log:
  level: info
  format: text
  addSource: false

postgrest:
  url: "http://rest:3000"
  anonKey: ""
  serviceKey: ""

supabase:
  anonKey: ""
  publishableKey: ""
  serviceKey: ""
  secretKey: ""
  dashboardUser: ""
  dashboardPassword: ""

upstreams:
  meta: "http://meta:8080"
  studio: "http://studio:3000"
  storage: "http://storage:5000"

waf:
  coraza:
    enabled: true
    owaspCRS: true
    requestBodyLimit: 10485760
    skipPaths:
      - /storage/v1/
  allowedIPs: []
  publicReadPaths: []

nats:
  url: "nats://nats:4222"
  optional: false

clickhouse:
  addr: "platform-clickhouse:9000"
  database: "platform"
  username: "default"
  password: ""

rpc:
  password1: "thinkmay protect your data"

relay:
  pollIntervalMs: 500
  batchSize: 50

# Global pg_cron replacement (D15/P14). Disabled by default; the scheduler
# binary (CMD=scheduler) sets APP_SCHEDULER_ENABLED=1. Each job ticks on `every`
# and calls a PostgREST RPC — billing math stays in Postgres (P5).
scheduler:
  enabled: false
  jobs:
    # F07: mark cancelled/ended subscriptions cleaned.
    - name: clean_expired_subscription
      every: 1m
      rpc: clean_expired_subscription
      timeoutMs: 5000
    # F17: settle verified payments (credit pockets + enqueue subscription jobs).
    - name: verify_all_payment
      every: 30s
      rpc: verify_all_payment_v2
      timeoutMs: 5000
    # F17: settle PAID deposits.
    - name: verify_all_deposits
      every: 30s
      rpc: verify_all_deposits
      timeoutMs: 5000

gateway:
  publicURL: "https://thinkmay.net"

admin:
  enabled: false
  allowedIPs: []
  allowedEmails: []
  cookieDomain: ".thinkmay.net"
  sessionTTLHours: 8
  otpTTLMinutes: 10
  signingSecret: ""
  basicAuthUser: ""
  basicAuthPassword: ""
  redis:
    url: "redis://redis:6379/0"
  resend:
    apiKey: ""
    from: "Thinkmay Ops <ops@thinkmay.net>"
  hosts:
    public: thinkmay.net
    studio: studio.thinkmay.net
    analytics: analytics.thinkmay.net
    grafana: grafana.thinkmay.net
  ingest:
    analyticsPrefix: /api/
  upstreams:
    studio: "http://studio:3000"
    rybbitClient: "http://rybbit-client:3000"
    rybbitBackend: "http://rybbit-backend:3001"
    grafana: "http://grafana:3000"

# Infra metrics push cache (D16). Used by CMD=metrics-aggregator only.
metrics:
  redisUrl: "redis://redis:6379/1"
  cacheTTLSeconds: 90
  scrapeCacheSeconds: 10
  ingestSecret: ""
  listenAddr: ":9090"

# Public edge (TDD D14): sole host-published ports :80 / :443.
tls:
  enabled: true
  httpPort: "80"
  httpsPort: "443"
  autocertCache: "/.autocert_cache"
  hosts:
    - thinkmay.net

# Dev-only plain HTTP when APP_TLS_ENABLED=0 (not used in compose).
port: "4000"
