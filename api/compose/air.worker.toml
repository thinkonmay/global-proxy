# air hot-reload for the worker binary. Run from /src (module root).
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/worker ./internal/worker"
bin = "./tmp/worker"
delay = 500
include_ext = ["go", "yaml", "yml"]
exclude_dir = ["tmp", "docs", "doc", ".git", ".claude", "compose"]
stop_on_error = true

[log]
time = true
