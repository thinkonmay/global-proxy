# air hot-reload for the gateway binary. Run from /src (module root).
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/gateway ./internal/gateway"
bin = "./tmp/gateway"
delay = 500
include_ext = ["go", "yaml", "yml"]
exclude_dir = ["tmp", "docs", "doc", ".git", ".claude", "compose"]
stop_on_error = true

[log]
time = true
