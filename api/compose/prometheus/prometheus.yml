global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Gateway metrics endpoint is not implemented yet (README mentions /metrics;
  # echo currently serves /health only). Left here as the wiring target.
  - job_name: thinkmay-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:4000"]
