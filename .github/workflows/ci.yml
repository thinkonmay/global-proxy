---
# Unit tests + builds for the gateway repository.
# Local equivalent: ./ci/local.sh [all]
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: CI (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: .
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-24.04
            stage: all
          - name: macos-arm64
            runner: macos-latest
            stage: default

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache-dependency-path: go.sum

      - uses: actions/checkout@v4

      - name: Run CI
        run: |
          chmod +x ./ci/local.sh
          ./ci/local.sh "${{ matrix.stage }}"
